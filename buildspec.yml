version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws --version
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"
      - IMAGE_TAG=$(echo "$CODEBUILD_RESOLVED_SOURCE_VERSION" | cut -c1-7)
      - IMAGE_URI="$ECR_REPO_URI:$IMAGE_TAG"
  build:
    commands:
      - echo Build started on $(date)
      - echo Building Docker image $IMAGE_URI
      - docker build -t "$IMAGE_URI" .
      - docker push "$IMAGE_URI"
  post_build:
    commands:
      - echo Build completed on $(date)
      - printf '{"ImageURI":"%s"}' "$IMAGE_URI" > imageDetail.json
      - TASK_DEF_ARN=$(aws ecs describe-services --cluster "$ECS_CLUSTER_NAME" --services "$ECS_SERVICE_NAME" --query 'services[0].taskDefinition' --output text)
      - aws ecs describe-task-definition --task-definition "$TASK_DEF_ARN" --query 'taskDefinition' --output json > taskdef-full.json
      - |
        jq --arg CONTAINER_NAME "$CONTAINER_NAME" 'del(
          .taskDefinitionArn,
          .revision,
          .status,
          .requiresAttributes,
          .compatibilities,
          .registeredAt,
          .registeredBy
        ) | .containerDefinitions |= map(if .name == $CONTAINER_NAME then .image = "<IMAGE1_NAME>" else . end)' taskdef-full.json > taskdef.json
      - |
        cat > appspec.yaml <<EOF
        version: 1.0
        Resources:
          - TargetService:
              Type: AWS::ECS::Service
              Properties:
                TaskDefinition: <TASK_DEFINITION>
                LoadBalancerInfo:
                  ContainerName: ${CONTAINER_NAME}
                  ContainerPort: ${CONTAINER_PORT}
        EOF

artifacts:
  files:
    - imageDetail.json
    - taskdef.json
    - appspec.yaml
