            <!-- Modal for zoom -->
            <div id="imgModal" style="display:none; position:fixed; z-index:9999; left:0; top:0; width:100vw; height:100vh; background:rgba(0,0,0,0.8); align-items:center; justify-content:center;">
                <span style="position:absolute; top:30px; right:50px; color:white; font-size:2em; cursor:pointer;" onclick="closeModal()">&times;</span>
                <img id="modalImg" src="" alt="" style="max-width:90vw; max-height:90vh; box-shadow:0 0 20px #000;">
            </div>
            <script>
                function openModal(img) {
                    document.getElementById('imgModal').style.display = 'flex';
                    document.getElementById('modalImg').src = img.src;
                    document.getElementById('modalImg').alt = img.alt;
                }
                function closeModal() {
                    document.getElementById('imgModal').style.display = 'none';
                }
                // Optional: Close modal when clicking outside the image
                document.getElementById('imgModal').addEventListener('click', function(e) {
                    if (e.target === this) closeModal();
                });
            </script>
