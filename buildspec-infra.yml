version: 0.2

phases:
  install:
    commands:
      - echo "Ensuring Terraform is available"
      - |
        if ! command -v terraform >/dev/null 2>&1; then
          curl -sSLo /tmp/terraform.zip https://releases.hashicorp.com/terraform/1.9.8/terraform_1.9.8_linux_amd64.zip
          unzip -o /tmp/terraform.zip -d /usr/local/bin
        fi
      - terraform version
  pre_build:
    commands:
      - echo "Using state object s3://$TF_STATE_BUCKET/$TF_STATE_KEY"
      - rm -f terraform.tfstate terraform.tfstate.backup tfplan
      - |
        if aws s3api head-object --bucket "$TF_STATE_BUCKET" --key "$TF_STATE_KEY" >/dev/null 2>&1; then
          aws s3 cp "s3://$TF_STATE_BUCKET/$TF_STATE_KEY" terraform.tfstate
        else
          echo "ERROR: Missing Terraform state object s3://$TF_STATE_BUCKET/$TF_STATE_KEY"
          echo "Bootstrap once by uploading the authoritative state, then re-run the pipeline."
          exit 1
        fi
  build:
    commands:
      - test -f terraform.pipeline.tfvars
      - terraform init -input=false
      - terraform validate
      - terraform plan -input=false -var-file=terraform.pipeline.tfvars -out=tfplan
      - terraform apply -input=false -auto-approve tfplan
  post_build:
    commands:
      - aws s3 cp terraform.tfstate "s3://$TF_STATE_BUCKET/$TF_STATE_KEY"
      - aws s3 cp terraform.tfstate.backup "s3://$TF_STATE_BUCKET/${TF_STATE_KEY}.backup" || true
